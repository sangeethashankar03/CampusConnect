{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>Register</h2>
  <form id="register-form">
    <input type="email" id="email" placeholder="University email" required><br><br>
    <input type="text" id="username" placeholder="Username" required><br><br>
    <input type="password" id="password" placeholder="Password" required><br><br>
    <button type="submit">Create account</button>
  </form>
  <p id="register-status"></p>
</div>

<script>
document.getElementById("register-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const email = document.getElementById("email").value;
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;
  const status = document.getElementById("register-status");

  if (!isValidEmail(email) || !isValidUsername(username) || !isValidPassword(password)) {
    status.textContent = "Please check your email, username and password format.";
    return;
  }

  try {
    await apiFetch("/auth/register", {
      method: "POST",
      body: JSON.stringify({ email, username, password }),
    });
    status.textContent = "Registered! You can now log in.";
  } catch (err) {
    status.textContent = err.message;
  }
});
</script>
{% endblock %}
