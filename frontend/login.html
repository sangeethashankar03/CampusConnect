<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CampusConnect - Login</title>
  <link rel="stylesheet" href="css/base.css">
</head>
<body>
  <div class="container">
    <h1>CampusConnect</h1>
    <nav>
      <a href="index.html">Home</a> |
      <a href="register.html">Register</a>
    </nav>

    <div class="card">
      <h2>Login</h2>
      <form id="login-form">
        <input type="email" id="email" placeholder="Email" required><br><br>
        <input type="password" id="password" placeholder="Password" required><br><br>
        <button type="submit">Log in</button>
      </form>
      <p id="login-status"></p>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/validation.js"></script>
  <script src="js/crypto.js"></script>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const status = document.getElementById("login-status");

      try {
        const data = await apiFetch("/auth/login", {
          method: "POST",
          body: JSON.stringify({ email, password }),
        });
        setToken(data.access_token);

        const encPair = await generateEncryptionKeyPair();
        const signPair = await generateSigningKeyPair();
        const encryptionPublicPem = await exportPublicKeyPem(encPair.publicKey);
        const signingPublicPem = await exportPublicKeyPem(signPair.publicKey);

        await apiFetch("/keys/register", {
          method: "POST",
          body: JSON.stringify({
            encryption_key: encryptionPublicPem,
            signing_key: signingPublicPem,
          }),
        });

        status.textContent = "Logged in and keys registered.";
        window.location.href = "chat.html";
      } catch (err) {
        status.textContent = err.message;
      }
    });
  </script>
</body>
</html>
